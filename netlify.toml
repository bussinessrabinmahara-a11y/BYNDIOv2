[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers for all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https://*.supabase.co wss://*.supabase.co; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://cdn.razorpay.com https://www.googletagmanager.com https://challenges.cloudflare.com https://www.clarity.ms https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com https://api.resend.com https://*.sentry.io https://o0.ingest.sentry.io https://cdnjs.cloudflare.com https://www.google-analytics.com https://www.googletagmanager.com https://challenges.cloudflare.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-src https://checkout.razorpay.com https://api.razorpay.com https://challenges.cloudflare.com https://razorpay.com https://cdn.razorpay.com; font-src 'self' data:; worker-src 'self' blob:;"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment Variables required (set in Netlify Dashboard > Site Settings > Environment Variables):
# VITE_SUPABASE_URL           — Supabase project URL
# VITE_SUPABASE_ANON_KEY      — Supabase anon/public key
# VITE_RAZORPAY_KEY_ID        — Razorpay publishable key (rzp_live_...)
# VITE_TURNSTILE_SITE_KEY     — Cloudflare Turnstile site key
# VITE_GA_ID                  — Google Analytics 4 Measurement ID (G-XXXXXXXXXX)
# VITE_CLARITY_ID             — Microsoft Clarity Project ID
# SUPABASE_URL                — Supabase URL (no VITE_ prefix, required for functions)
# SUPABASE_SERVICE_ROLE_KEY   — Supabase service role key (server-only)
# RAZORPAY_KEY_ID             — Razorpay key ID (no VITE_ prefix, for functions)
# RAZORPAY_KEY_SECRET         — Razorpay secret key (server-only, never VITE_)
# RAZORPAY_WEBHOOK_SECRET     — Razorpay webhook secret (Dashboard > Webhooks > Secret)
# TURNSTILE_SECRET_KEY        — Cloudflare Turnstile secret key (server-only)
# RESEND_API_KEY              — Resend.com API key for emails
# FROM_EMAIL                  — Verified sender email (e.g. noreply@byndio.in)
# SHIPROCKET_EMAIL            — Shiprocket account email
# SHIPROCKET_PASSWORD         — Shiprocket account password
# UPSTASH_REDIS_REST_URL      — Optional: Upstash Redis URL for production rate limiting
# UPSTASH_REDIS_REST_TOKEN    — Optional: Upstash Redis Token


# ============================================================
# SCHEDULED FUNCTIONS
# ============================================================
[[scheduled_functions]]
  name = "weekly-digest"
  cron = "30 3 * * 1"
  # Runs every Monday at 9:00 AM IST (3:30 UTC)
[[scheduled_functions]]
  name = "seller-digest"
  cron = "0 3 * * 1"
  # Runs every Monday at 9:00 AM IST (3:00 UTC)
